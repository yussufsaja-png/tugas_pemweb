    <main>

        <form class="reg-form">

            <fieldset>

                <legend>Form Pendaftaran</legend>

                <div class="form-group">

                    <label>Nama Lengkap</label>

                    <input type="text" placeholder="Masukkan nama">

                </div>

                <div class="form-group">

                    <label>Minat Laboratorium</label>

                    <select>
                        <option>Information Retrieval</option>
                        <option>Software Engineering</option>
                        <option>Intelligent Computing</option>
                    </select>

                </div>

                <div class="form-group">

                    <label>Bahasa Pemrograman</label>

                    <input type="text" placeholder="HTML, CSS, JavaScript">

                </div>

                <button type="submit">
                    Daftar
                </button>

            </fieldset>

        </form>

    </main>
